<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
    <style>
        body { font-family: Arial; margin: 50px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        textarea { width: 100%; height: 120px; padding: 10px; font-size: 16px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Sentiment Analysis</h2>
        <form method="POST">
            <textarea name="text" placeholder="Enter your text here...">{{ user_text }}</textarea>
            <br><br>
            <button type="submit">Analyze Sentiment</button>
        </form>

        {% if sentiment %}
        <div class="result">
            <strong>Text:</strong> {{ user_text }}<br>
            <strong>Sentiment:</strong> {{ sentiment }}<br>
            <strong>Polarity:</strong> {{ polarity }} ( -1 = very negative, +1 = very positive )<br>
            <strong>Subjectivity:</strong> {{ subjectivity }} ( 0 = objective, 1 = subjective )
        </div>
        {% endif %}
    </div>
</body>
</html>
